name: kride
description: KRide - India's Ride Hailing & Delivery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.1

  # State & Storage
  provider: ^6.1.2
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.6

  # Location & Maps (MapMyIndia - add when API key ready)
  # mappls_gl: ^1.0.0        # Uncomment when MapMyIndia key ready
  geolocator: ^11.0.0        # For GPS location
  geocoding: ^3.0.0          # Keep as fallback

  # Auth & Phone
  intl_phone_field: ^3.2.0
  pinput: ^3.0.0
  intl: ^0.19.0

  # Utilities
  url_launcher: ^6.2.6
  image_picker: ^1.0.7
  permission_handler: ^11.3.0

  # Alerts
  audioplayers: ^5.2.1
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
